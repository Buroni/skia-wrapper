<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanvasKit Zoom to Cursor</title>
    <script src="https://unpkg.com/canvaskit-wasm@0.39.1/bin/canvaskit.js"></script>
    <script>
        window.CanvasKitInit = CanvasKitInit;
    </script>
    <!-- <script src="./panZoom.js"></script> -->
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
        }

        #container {
            margin: 0 auto;
            width: 1400px;
            height: 800px;
        }

        #canvas {
            border: 2px solid #444;
            border-radius: 8px;
            background: #fff;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas" width="1400" height="800"></canvas>
    </div>

    <script type="module">
        import { useSkia } from './dist/skia.js';
        import { usePanZoomWorld } from './dist/world/panZoomWorld.js';
        import { useStaticWorld } from './dist/world/staticWorld.js';
        import { useNodes } from './dist/nodes.js';
        import { useEventListeners } from './dist/eventListeners.js';
        import { useDragDrop } from './dist/dragDrop.js';

        (async () => {
            const skiaContext = await useSkia('#canvas');

            usePanZoomWorld(skiaContext);
            // useStaticWorld(skiaContext);
            useDragDrop(skiaContext);

            const listenerContext = useEventListeners(skiaContext);
            const listenerId = listenerContext.addEventListener(
                'mousemove', 
                skiaContext.nodes, 
                (e, node, isInside) => {
                    node.style.strokeWidth = isInside ? 6 : 4;
                    node.style.strokeColor = isInside ? [255, 0, 0, 0.5] : [0, 0, 0, 1];
                },
                (e, isInside) => {
                    skiaContext.canvasEl.style.cursor = isInside ? 'pointer' : 'default';
                }
            );

            const { nodeContext, addCircle } = useNodes(skiaContext);
            await nodeContext.addFont('Roboto', 'https://cdn.skia.org/misc/Roboto-Regular.ttf');

            skiaContext.canvasEl.addEventListener('dblclick', () => {
                nodeContext.createNode(
                    addCircle(skiaContext.mouse.worldX, skiaContext.mouse.worldY, 50),
                    { labelOptions: { text: `${skiaContext.nodes.length}`, fontName: 'Roboto', fontSize: 24 } }
                );
            });
        })();
    </script>
</body>
</html>
